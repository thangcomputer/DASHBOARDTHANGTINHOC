name: Node CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  smoke-api:
    runs-on: ubuntu-latest
    needs: [backend]
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://127.0.0.1:27017/quanlycms_ci
      JWT_SECRET: ci_jwt_secret_must_be_at_least_32_chars_long
      JWT_REFRESH_SECRET: ci_refresh_secret_must_be_at_least_32_chars
      CLIENT_URL: http://localhost:5173
      BACKUP_SCHEDULE: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Start API
        run: |
          nohup node server.js > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
      - name: Wait for healthz
        run: node scripts/wait-for-health.cjs http://127.0.0.1:5000/healthz 90000
      - name: Smoke API
        run: npm run smoke:api
      - name: API logs on failure
        if: failure()
        run: cat /tmp/api.log || true
